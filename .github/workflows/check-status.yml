name: Check Service Status

on:
  workflow_dispatch:

jobs:
  check:
    name: Check logs and art cache
    runs-on: self-hosted
    steps:
      - name: Art cache files
        run: |
          echo "=== Art cache (today) ==="
          ls -lh /var/lib/homecountdown/art-cache/$(date +%Y-%m-%d)* 2>/dev/null || echo "no files for today"
          echo ""
          echo "=== Today JSON ==="
          cat /var/lib/homecountdown/art-cache/$(date +%Y-%m-%d).json 2>/dev/null || echo "not found"
          echo ""
          echo "=== Animation error log ==="
          cat /var/lib/homecountdown/art-cache/animation-error.txt 2>/dev/null || echo "no animation errors logged"
