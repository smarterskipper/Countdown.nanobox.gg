name: Check Service Status

on:
  workflow_dispatch:

jobs:
  check:
    name: Check logs and art cache
    runs-on: self-hosted
    steps:
      - name: Art cache files
        run: |
          echo "=== All art cache files ==="
          ls -lht /var/lib/homecountdown/art-cache/ 2>/dev/null | head -20
          echo ""
          echo "=== 2026-03-26.json ==="
          cat /var/lib/homecountdown/art-cache/2026-03-26.json 2>/dev/null || echo "not found"
          echo ""
          echo "=== Animation error log ==="
          cat /var/lib/homecountdown/art-cache/animation-error.txt 2>/dev/null || echo "no animation errors logged"
