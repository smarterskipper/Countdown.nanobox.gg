name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Homelab LXC
    runs-on: self-hosted

    steps:
      # ── 0. Discord — deploy started ───────────────────────────────────────
      - name: Notify Discord — started
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          PAYLOAD=$(jq -n \
            --arg sha "$SHORT_SHA" \
            --arg msg "$COMMIT_MSG" \
            --arg actor "${{ github.actor }}" \
            --arg run_num "${{ github.run_number }}" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{embeds:[{title:"🔨 Deploy started",description:("`"+$sha+"`  "+$msg),color:16776960,fields:[{name:"Triggered by",value:$actor,inline:true},{name:"Run",value:("[#"+$run_num+"]("+$run_url+")"),inline:true}],footer:{text:"HomelabCountdown CI/CD"}}]}')
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      # ── 1. Pull latest code ───────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Restore & build ────────────────────────────────────────────────
      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      # ── 3. Publish to staging directory ───────────────────────────────────
      - name: Publish
        run: |
          dotnet publish \
            --configuration Release \
            --output /opt/homecountdown/next \
            --no-build

      # ── 4. Write secrets to protected env file ────────────────────────────
      - name: Write environment secrets
        run: |
          printf 'ANTHROPIC_API_KEY=%s\nREPLICATE_API_KEY=%s\nDISCORD_WEBHOOK_URL=%s\nASPNETCORE_URLS=http://0.0.0.0:5000\nASPNETCORE_ENVIRONMENT=Production\nPLAYWRIGHT_BROWSERS_PATH=/home/runner/.cache/ms-playwright\nArtCache__Path=/var/lib/homecountdown/art-cache\nGoogle__ClientId=%s\nGoogle__ClientSecret=%s\nGoogle__ApprovedEmails=%s\nTZ=America/Denver\n' \
            '${{ secrets.ANTHROPIC_API_KEY }}' \
            '${{ secrets.REPLICATE_API_KEY }}' \
            '${{ secrets.DISCORD_WEBHOOK_URL }}' \
            '${{ secrets.GOOGLE_CLIENT_ID }}' \
            '${{ secrets.GOOGLE_CLIENT_SECRET }}' \
            '${{ secrets.GOOGLE_APPROVED_EMAILS }}' \
            | sudo tee /etc/homecountdown.env > /dev/null
          mkdir -p /var/lib/homecountdown/art-cache
          sudo chmod 600 /etc/homecountdown.env

      # ── 5. Swap release and restart ───────────────────────────────────────
      - name: Swap release and restart service
        run: |
          sudo systemctl stop homecountdown || true
          sudo rm -rf /opt/homecountdown/current
          sudo mv /opt/homecountdown/next /opt/homecountdown/current
          mkdir -p /opt/homecountdown/next
          sudo systemctl start homecountdown

      # ── 6. Health check ───────────────────────────────────────────────────
      - name: Health check
        run: |
          echo "Waiting for app to start..."
          for i in {1..12}; do
            if curl --fail --silent --max-time 5 http://localhost:5000 > /dev/null 2>&1; then
              echo "✓ App is responding (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: not ready yet, waiting 5s..."
            sleep 5
          done
          echo "✗ Health check failed after 60s"
          sudo journalctl -u homecountdown -n 30
          exit 1

      # ── 7. Discord success notification ───────────────────────────────────
      - name: Notify Discord — success
        if: success()
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          PAYLOAD=$(jq -n \
            --arg sha "$SHORT_SHA" \
            --arg msg "$COMMIT_MSG" \
            --arg actor "${{ github.actor }}" \
            --arg branch "${{ github.ref_name }}" \
            '{embeds:[{title:"✅ Deploy succeeded",description:"**countdown.nanobox.gg** is live",color:3066993,fields:[{name:"Commit",value:("`"+$sha+"`  "+$msg),inline:false},{name:"Triggered by",value:$actor,inline:true},{name:"Branch",value:$branch,inline:true}],footer:{text:"HomelabCountdown CI/CD"}}]}')
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      # ── 8. Discord failure notification ───────────────────────────────────
      - name: Notify Discord — failure
        if: failure()
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"

          # Service logs — last 20 lines, truncated to fit Discord field limit
          SERVICE_LOGS=$(sudo journalctl -u homecountdown -n 20 --no-pager 2>/dev/null \
            | cut -c1-150 \
            || echo "logs unavailable")

          # Env file presence check (values redacted for security)
          ENV_CHECK=$(awk -F= '
            NR==1{print "```"}
            {
              key=$1
              val=$2
              if (length(val)==0) status="❌ MISSING"
              else if (key ~ /SECRET|KEY|PASSWORD/) status="✅ set (redacted)"
              else status="✅ " val
              print key " = " status
            }
            END{print "```"}
          ' /etc/homecountdown.env 2>/dev/null || echo "\`\`\`env file not found\`\`\`")

          # Disk space
          DISK=$(df -h /opt/homecountdown 2>/dev/null | tail -1 | awk '{print $3"/"$4" used ("$5")"}' || echo "unavailable")

          # systemd service status
          SVC_STATUS=$(sudo systemctl is-active homecountdown 2>/dev/null || echo "unknown")

          PAYLOAD=$(jq -n \
            --arg sha "$SHORT_SHA" \
            --arg msg "$COMMIT_MSG" \
            --arg actor "${{ github.actor }}" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg svc "$SVC_STATUS" \
            --arg disk "$DISK" \
            --arg env_check "$ENV_CHECK" \
            --arg logs "$SERVICE_LOGS" \
            '{embeds:[{
              title:"❌ Deploy failed",
              color:15158332,
              fields:[
                {name:"Commit",value:("`"+$sha+"`  "+$msg),inline:false},
                {name:"Triggered by",value:$actor,inline:true},
                {name:"Run",value:("[view logs]("+$run_url+")"),inline:true},
                {name:"Service state",value:$svc,inline:true},
                {name:"Disk usage (/opt/homecountdown)",value:$disk,inline:true},
                {name:"Env file",value:$env_check,inline:false},
                {name:"Service logs (last 20)",value:("```\n"+$logs+"\n```"),inline:false}
              ],
              footer:{text:"HomelabCountdown CI/CD"}
            }]}')
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
