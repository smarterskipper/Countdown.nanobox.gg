name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:        # lets you trigger manually from the GitHub UI

jobs:
  deploy:
    name: Deploy to Homelab LXC
    runs-on: self-hosted     # the runner agent installed on your LXC

    steps:
      # ── 1. Pull latest code ───────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Restore & build ────────────────────────────────────────────────
      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      # ── 4. Publish to staging directory ───────────────────────────────────
      - name: Publish
        run: |
          dotnet publish \
            --configuration Release \
            --output /opt/homecountdown/next \
            --no-build

      # ── 5. Write secrets to protected env file ────────────────────────────
      - name: Write environment secrets
        run: |
          printf 'ANTHROPIC_API_KEY=%s\nASPNETCORE_URLS=http://0.0.0.0:5000\nASPNETCORE_ENVIRONMENT=Production\n' \
            '${{ secrets.ANTHROPIC_API_KEY }}' \
            | sudo tee /etc/homecountdown.env > /dev/null
          sudo chmod 600 /etc/homecountdown.env

      # ── 6. Swap release and restart ───────────────────────────────────────
      - name: Swap release and restart service
        run: |
          sudo systemctl stop homecountdown || true
          sudo rm -rf /opt/homecountdown/current
          sudo mv /opt/homecountdown/next /opt/homecountdown/current
          mkdir -p /opt/homecountdown/next
          sudo systemctl start homecountdown

      # ── 7. Health check ───────────────────────────────────────────────────
      - name: Health check
        run: |
          sleep 8
          curl --fail --silent --max-time 15 http://localhost:5000 \
            && echo "✓ App is responding" \
            || (echo "✗ Health check failed" && sudo journalctl -u homecountdown -n 30 && exit 1)
