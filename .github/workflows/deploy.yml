name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Homelab LXC
    runs-on: self-hosted

    steps:
      # ── 0. Discord — deploy started ───────────────────────────────────────
      - name: Notify Discord — started
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🔨 Deploy started\",
                \"description\": \"\`${SHORT_SHA}\`  ${{ github.event.head_commit.message }}\",
                \"color\": 16776960,
                \"fields\": [
                  {\"name\": \"Triggered by\", \"value\": \"${{ github.actor }}\", \"inline\": true},
                  {\"name\": \"Run\", \"value\": \"[#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": true}
                ],
                \"footer\": {\"text\": \"HomelabCountdown CI/CD\"}
              }]
            }"

      # ── 1. Pull latest code ───────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Restore & build ────────────────────────────────────────────────
      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      # ── 3. Publish to staging directory ───────────────────────────────────
      - name: Publish
        run: |
          dotnet publish \
            --configuration Release \
            --output /opt/homecountdown/next \
            --no-build

      # ── 4. Write secrets to protected env file ────────────────────────────
      - name: Write environment secrets
        run: |
          printf 'ANTHROPIC_API_KEY=%s\nDISCORD_WEBHOOK_URL=%s\nASPNETCORE_URLS=http://0.0.0.0:5000\nASPNETCORE_ENVIRONMENT=Production\nPLAYWRIGHT_BROWSERS_PATH=/home/runner/.cache/ms-playwright\nArtCache__Path=/var/lib/homecountdown/art-cache\n' \
            '${{ secrets.ANTHROPIC_API_KEY }}' \
            '${{ secrets.DISCORD_WEBHOOK_URL }}' \
            | sudo tee /etc/homecountdown.env > /dev/null
          sudo mkdir -p /var/lib/homecountdown/art-cache
          sudo chown runner:runner /var/lib/homecountdown/art-cache
          sudo chmod 600 /etc/homecountdown.env

      # ── 5. Swap release and restart ───────────────────────────────────────
      - name: Swap release and restart service
        run: |
          sudo systemctl stop homecountdown || true
          sudo rm -rf /opt/homecountdown/current
          sudo mv /opt/homecountdown/next /opt/homecountdown/current
          mkdir -p /opt/homecountdown/next
          sudo systemctl start homecountdown

      # ── 6. Health check ───────────────────────────────────────────────────
      - name: Health check
        run: |
          sleep 8
          curl --fail --silent --max-time 15 http://localhost:5000 \
            && echo "✓ App is responding" \
            || (echo "✗ Health check failed" && sudo journalctl -u homecountdown -n 30 && exit 1)

      # ── 7. Discord success notification ───────────────────────────────────
      - name: Notify Discord — success
        if: success()
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"✅ Deploy succeeded\",
                \"description\": \"**countdown.nanobox.gg** is live\",
                \"color\": 3066993,
                \"fields\": [
                  {\"name\": \"Commit\", \"value\": \"\`${SHORT_SHA}\`  ${{ github.event.head_commit.message }}\", \"inline\": false},
                  {\"name\": \"Triggered by\", \"value\": \"${{ github.actor }}\", \"inline\": true},
                  {\"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true}
                ],
                \"footer\": {\"text\": \"HomelabCountdown CI/CD\"}
              }]
            }"

      # ── 8. Discord failure notification ───────────────────────────────────
      - name: Notify Discord — failure
        if: failure()
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"❌ Deploy failed\",
                \"description\": \"Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.\",
                \"color\": 15158332,
                \"fields\": [
                  {\"name\": \"Commit\", \"value\": \"\`${SHORT_SHA}\`  ${{ github.event.head_commit.message }}\", \"inline\": false},
                  {\"name\": \"Triggered by\", \"value\": \"${{ github.actor }}\", \"inline\": true}
                ],
                \"footer\": {\"text\": \"HomelabCountdown CI/CD\"}
              }]
            }"
